<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox WhatsApp — Cigana Maria</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{background:#0b141a;color:#e9edef;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{background:#202c33;padding:9px 14px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #2a3942}
  header h1{font-size:15px;font-weight:700;color:#25d366;margin-right:4px}
  header select,header input{background:#2a3942;color:#e9edef;border:1px solid #374248;border-radius:8px;padding:7px 10px;font-size:13px}
  header input{flex:1;min-width:120px}
  header button{background:#25d366;color:#062b16;border:none;border-radius:8px;padding:7px 12px;font-weight:700;cursor:pointer;font-size:13px}
  .toggle{font-size:12px;color:#8696a0;display:flex;align-items:center;gap:5px;cursor:pointer}
  .wrap{flex:1;display:flex;overflow:hidden}
  .list{width:370px;min-width:300px;background:#111b21;overflow-y:auto;border-right:1px solid #2a3942}
  .statbar{padding:7px 12px;background:#182229;font-size:11px;color:#8696a0;border-bottom:1px solid #222d34}
  .statbar b{color:#25d366}
  .conv{padding:10px 12px;border-bottom:1px solid #1f2c33;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
  .conv:hover{background:#202c33}
  .conv.sel{background:#2a3942}
  .av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#00a884,#0a6e5c);flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:15px;position:relative}
  .wdot{position:absolute;bottom:-1px;right:-1px;width:13px;height:13px;border-radius:50%;border:2px solid #111b21}
  .wdot.open{background:#25d366}.wdot.urgent{background:#f5a623}.wdot.closed{background:#f15c6d}.wdot.none{background:#8696a0}
  .conv .mid{flex:1;min-width:0}
  .conv .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv .last{font-size:12.5px;color:#8696a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
  .tag{font-size:9.5px;padding:1px 6px;border-radius:9px;font-weight:700;white-space:nowrap}
  .conv .meta{text-align:right;flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .conv .hora{font-size:11px;color:#8696a0}
  .dot{width:9px;height:9px;border-radius:50%;background:#25d366}
  .panel{flex:1;display:flex;flex-direction:column;background:#0b141a;background-image:linear-gradient(rgba(11,20,26,.96),rgba(11,20,26,.96))}
  .phead{background:#202c33;padding:9px 16px;border-bottom:1px solid #2a3942;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .phead .t{font-weight:700;font-size:15px}
  .phead .sub{font-size:11px;color:#8696a0;margin-top:2px}
  .wbadge{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:700;white-space:nowrap}
  .wbadge.open{background:rgba(37,211,102,.16);color:#25d366}.wbadge.urgent{background:rgba(245,166,35,.16);color:#f5a623}.wbadge.closed{background:rgba(241,92,109,.16);color:#f15c6d}.wbadge.none{background:rgba(134,150,160,.16);color:#8696a0}
  .thread{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:6px}
  .divider{text-align:center;margin:8px 0}.divider span{background:#182229;color:#8696a0;font-size:11px;padding:4px 11px;border-radius:8px}
  .b{max-width:72%;padding:7px 11px;border-radius:9px;font-size:14px;line-height:1.4;white-space:pre-wrap;word-wrap:break-word}
  .b.in{background:#202c33;align-self:flex-start;border-top-left-radius:2px}
  .b.out{background:#005c4b;align-self:flex-end;border-top-right-radius:2px}
  .b .h{font-size:10px;color:#8696a0;margin-top:3px;text-align:right}
  .b a{color:#53bdeb}
  .reply{padding:12px 16px;background:#202c33;display:flex;gap:10px;align-items:flex-end}
  .reply textarea{flex:1;background:#2a3942;color:#e9edef;border:none;border-radius:10px;padding:10px 12px;font-size:14px;resize:none;max-height:120px;font-family:inherit}
  .reply button{background:#25d366;color:#062b16;border:none;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;flex:none}
  .reply button:disabled{opacity:.5}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;color:#8696a0;font-size:14px;text-align:center;padding:20px}
  .loading{padding:16px;text-align:center;color:#8696a0;font-size:13px}
  @media(max-width:760px){.list{width:100%}.panel{display:none}.panel.show{display:flex;position:fixed;inset:0;z-index:10}.list.hide{display:none}}
</style>
</head>
<body>
<header>
  <h1>📲 Inbox WhatsApp</h1>
  <select id="fNum"><option value="">Todos os números</option></select>
  <input id="q" placeholder="Buscar nome ou número...">
  <label class="toggle"><input type="checkbox" id="onlyUnans" style="flex:none"> só sem resposta</label>
  <label class="toggle"><input type="checkbox" id="auto" checked style="flex:none">🔄</label>
  <label class="toggle"><input type="checkbox" id="snd" checked style="flex:none">🔔</label>
  <button onclick="carregar()">↻</button>
</header>
<div class="wrap">
  <div class="list" id="list"><div class="loading">Carregando...</div></div>
  <div class="panel" id="panel">
    <div class="empty" id="empty">← Selecione uma conversa</div>
    <div class="phead" id="phead" style="display:none">
      <div><div class="t" id="ptit"></div><div class="sub" id="psub"></div></div>
      <div style="display:flex;gap:7px;align-items:center"><span id="pnum" class="tag"></span><span id="pwin" class="wbadge"></span></div>
    </div>
    <div class="thread" id="thread" style="display:none"></div>
    <div class="reply" id="replyBox" style="display:none">
      <textarea id="msg" rows="1" placeholder="Escreva a resposta..."></textarea>
      <button id="send" onclick="enviar()">➤</button>
    </div>
  </div>
</div>
<script>
const API=localStorage.getItem("cgm_inbox_api")||"https://primary-production-6759.up.railway.app/webhook/wpp-inbox";
let KEY=localStorage.getItem("cgm_inbox_k")||"";
if(!KEY){ KEY=(prompt("Senha do painel (peça ao admin):")||"").trim(); if(KEY) localStorage.setItem("cgm_inbox_k",KEY); }
const PALETA={};const CORES=["#25d366","#53bdeb","#f5a623","#9b59b6","#f15c6d","#16a085"];
const OFERTAS=[{min:82,v:'R$97'},{min:62,v:'R$67'},{min:42,v:'R$70'},{min:1,v:'R$40'}];
let atual=null, convs=[], lastSeen={}, first=true;

async function api(p){ const r=await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(Object.assign({k:KEY},p))}); return await r.json(); }
function corNum(l){ if(!PALETA[l]) PALETA[l]=CORES[Object.keys(PALETA).length%CORES.length]; return PALETA[l]; }
function oferta(e){ for(const o of OFERTAS){ if(e>=o.min) return o.v; } return 'R$40'; }
function esc(s){ return (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }
function hora(s){ try{ return new Date(s).toLocaleTimeString("pt-BR",{timeZone:"America/Sao_Paulo",hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } }
function diaLabel(s){ if(!s) return ''; const d=new Date(s),n=new Date(),diff=n-d;
  if(diff<86400000&&d.getDate()===n.getDate()) return 'Hoje'; if(diff<172800000) return 'Ontem';
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",timeZone:"America/Sao_Paulo"}); }
function janela(rec){ if(!rec) return {cls:'none',lbl:'sem msg'}; const rem=86400000-(Date.now()-new Date(rec).getTime());
  if(rem<=0) return {cls:'closed',lbl:'Fora 24h'}; const h=Math.floor(rem/3600000),m=Math.floor((rem%3600000)/60000);
  return {cls:rem<3600000?'urgent':'open', lbl:(h>0?h+'h ':'')+m+'m'}; }

async function initNumeros(){ const d=await api({action:"numeros"}); if(d.ok){ d.numeros.forEach(n=>{ const o=document.createElement("option");o.value=n.phone_id;o.textContent=n.label;document.getElementById("fNum").appendChild(o); }); } }

async function carregar(){
  const d=await api({action:"list",q:document.getElementById("q").value||null,phone:document.getElementById("fNum").value||null});
  const el=document.getElementById("list");
  if(!d.ok){ el.innerHTML='<div class="loading">Erro: '+(d.error||"?")+' (senha?)</div>'; return; }
  let list=d.list||[];
  // som: nova recebida
  let nova=false;
  list.forEach(c=>{ if(c.ultima_recebida_em && c.ultima_recebida_em!==lastSeen[c.messenger_id]){ if(lastSeen[c.messenger_id]!==undefined) nova=true; lastSeen[c.messenger_id]=c.ultima_recebida_em; } });
  if(nova && !first && document.getElementById("snd").checked) beep(); first=false;
  if(document.getElementById("onlyUnans").checked) list=list.filter(c=>c.sem_resposta);
  // ordena: sem-resposta primeiro, depois recente
  list.sort((a,b)=>{ if(a.sem_resposta!==b.sem_resposta) return a.sem_resposta?-1:1; return new Date(b.ultima_em||0)-new Date(a.ultima_em||0); });
  convs=list;
  // stats
  const semR=(d.list||[]).filter(c=>c.sem_resposta).length, pagos=(d.list||[]).filter(c=>c.qualificado).length;
  let stat='<div class="statbar">Conversas <b>'+(d.list||[]).length+'</b> · 🔴 sem resposta <b>'+semR+'</b> · ✓ pagos <b>'+pagos+'</b></div>';
  if(!convs.length){ el.innerHTML=stat+'<div class="loading">Nenhuma conversa.</div>'; return; }
  el.innerHTML=stat+convs.map((c,i)=>{
    const nome=c.nome||c.messenger_id, ini=(nome||"?").trim().charAt(0).toUpperCase();
    const lbl=c.label||"?", w=janela(c.ultima_recebida_em);
    const pagoTag = c.qualificado ? '<span class="tag" style="background:#25d36622;color:#25d366">✓ pago'+(c.comprovante_valor?(' R$'+c.comprovante_valor):'')+'</span>' : '';
    return '<div class="conv'+(atual===c.messenger_id?' sel':'')+'" onclick="abrir('+i+')">'
      +'<div class="av">'+ini+'<span class="wdot '+w.cls+'" title="'+w.lbl+'"></span></div>'
      +'<div class="mid"><div class="nm">'+esc(nome)+'</div>'
      +'<div class="last">'+(c.ultima_dir==="enviada"?"↪ ":"")+esc(c.ultima||"")+'</div>'
      +'<div class="tags"><span class="tag" style="background:'+corNum(lbl)+'22;color:'+corNum(lbl)+'">📱'+esc(lbl)+'</span>'
      +'<span class="tag" style="background:#ffffff10;color:#c9d3d8">Et.'+(c.etapa_atual||0)+' · '+oferta(c.etapa_atual)+'</span>'
      +'<span class="tag" style="background:#53bdeb22;color:#53bdeb">'+esc(c.status||'')+'</span>'+pagoTag+'</div></div>'
      +'<div class="meta"><span class="hora">'+hora(c.ultima_em)+'</span>'+(c.sem_resposta?'<span class="dot"></span>':'')+'</div></div>';
  }).join("");
}

async function abrir(i){
  const c=convs[i]; atual=c.messenger_id;
  document.getElementById("empty").style.display="none";
  document.getElementById("phead").style.display="flex";
  document.getElementById("thread").style.display="flex";
  document.getElementById("replyBox").style.display="flex";
  document.getElementById("panel").classList.add("show"); document.getElementById("list").classList.add("hide");
  document.getElementById("ptit").textContent=(c.nome||c.messenger_id);
  document.getElementById("psub").textContent=c.messenger_id+' · Etapa '+(c.etapa_atual||0)+' · '+(c.status||'')+(c.qualificado?' · ✓ pago'+(c.comprovante_valor?(' R$'+c.comprovante_valor):''):'');
  const lbl=c.label||"?"; const pn=document.getElementById("pnum"); pn.textContent='📱 '+lbl; pn.style.background=corNum(lbl)+"22"; pn.style.color=corNum(lbl);
  const w=janela(c.ultima_recebida_em); const pw=document.getElementById("pwin"); pw.className='wbadge '+w.cls; pw.textContent=(w.cls==='closed'?'🔴 ':w.cls==='none'?'⚪ ':w.cls==='urgent'?'🟠 ':'🟢 ')+(w.cls==='open'||w.cls==='urgent'?'Responde em '+w.lbl:w.lbl);
  const inp=document.getElementById("msg"); inp.placeholder = w.cls==='closed'?'⚠️ Fora da janela 24h — pode não entregar':'Escreva a resposta...';
  carregar();
  const th=document.getElementById("thread"); th.innerHTML='<div class="loading">Carregando...</div>';
  const d=await api({action:"thread",id:c.messenger_id});
  if(!d.ok){ th.innerHTML='<div class="loading">Erro.</div>'; return; }
  let lastD="", html="";
  (d.thread||[]).forEach(m=>{
    const dl=diaLabel(m.criado_em); if(dl!==lastD){ html+='<div class="divider"><span>'+dl+'</span></div>'; lastD=dl; }
    let body=m.conteudo||"";
    if(!body && m.tipo){ body="["+m.tipo+"]"; if(m.media_url&&/^https?:/.test(m.media_url)) body='<a href="'+m.media_url+'" target="_blank">['+m.tipo+']</a>'; }
    html+='<div class="b '+(m.direcao==="recebida"?"in":"out")+'">'+(m.conteudo?esc(body):body)+'<div class="h">'+hora(m.criado_em)+'</div></div>';
  });
  th.innerHTML=html||'<div class="loading">Sem mensagens.</div>'; th.scrollTop=th.scrollHeight;
}
async function enviar(){
  const t=document.getElementById("msg").value.trim(); if(!t||!atual) return;
  const btn=document.getElementById("send"); btn.disabled=true;
  const d=await api({action:"send",id:atual,text:t});
  btn.disabled=false;
  if(d.ok){ document.getElementById("msg").value=""; const i=convs.findIndex(c=>c.messenger_id===atual); if(i>=0) abrir(i); }
  else alert("Falha ao enviar: "+(d.error||d.detalhe||"?"));
}
function beep(){ try{ const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.start();o.stop(c.currentTime+.3);}catch(e){} }
document.getElementById("msg").addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); enviar(); }});
document.getElementById("q").addEventListener("input",()=>{ clearTimeout(window._t); window._t=setTimeout(carregar,400); });
document.getElementById("fNum").addEventListener("change",carregar);
document.getElementById("onlyUnans").addEventListener("change",carregar);
setInterval(()=>{ if(document.getElementById("auto").checked) carregar(); },20000);
initNumeros(); carregar();
</script>
</body>
</html>
