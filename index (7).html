<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cigana Maria · Central de Conversas</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0b141a; --panel: #111b21; --panel2: #202c33; --panel3: #2a3942;
  --green: #00a884; --green2: #005c4b; --text: #e9edef; --muted: #8696a0;
  --border: #222d34; --red: #f15c6d; --orange: #f5a623; --blue: #53bdeb; --gold: #f5c451;
}
body { font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; display: flex; background: var(--bg); color: var(--text); overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 400px; min-width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--panel); }
.sidebar-header { padding: 12px 16px; background: var(--panel2); display: flex; align-items: center; gap: 10px; }
.sidebar-header h2 { font-size: 16px; font-weight: 600; flex: 1; }
.icon-btn { background: none; border: none; color: var(--muted); font-size: 17px; cursor: pointer; padding: 6px; border-radius: 6px; transition: all .15s; }
.icon-btn:hover { background: var(--panel3); color: var(--text); }

.tabs { display: flex; background: var(--panel2); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
.tab.active { color: var(--green); border-bottom-color: var(--green); }

.search-box { padding: 8px 12px; }
.search-box input { width: 100%; padding: 8px 12px; border-radius: 8px; border: none; background: var(--panel2); color: var(--text); font-size: 14px; outline: none; }
.search-box input::placeholder { color: var(--muted); }

.filter-bar { padding: 4px 12px 8px; display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { padding: 4px 11px; border-radius: 14px; border: none; background: var(--panel2); color: var(--muted); font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
.filter-btn:hover { background: var(--panel3); }
.filter-btn.active { background: var(--green); color: #06241d; font-weight: 600; }

.sort-row { padding: 0 12px 8px; display: flex; align-items: center; gap: 8px; }
.sort-row select { flex: 1; background: var(--panel2); color: var(--text); border: none; padding: 6px 8px; border-radius: 6px; font-size: 12px; outline: none; cursor: pointer; }

.contacts-list { flex: 1; overflow-y: auto; }
.contact-item { display: flex; align-items: center; padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .12s; position: relative; }
.contact-item:hover { background: var(--panel3); }
.contact-item.active { background: var(--panel3); }
.contact-avatar { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg,#00a884,#0a6e5c); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: #fff; flex-shrink: 0; position: relative; }
.window-dot { position: absolute; bottom: 0; right: 0; width: 13px; height: 13px; border-radius: 50%; border: 2px solid var(--panel); }
.window-dot.open { background: var(--green); }
.window-dot.urgent { background: var(--orange); }
.window-dot.closed { background: var(--red); }
.window-dot.none { background: var(--muted); }
.contact-info { margin-left: 11px; flex: 1; min-width: 0; }
.contact-top { display: flex; align-items: center; gap: 6px; }
.contact-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.contact-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.contact-bottom { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
.contact-preview { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.contact-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
.tag.etapa { background: rgba(0,168,132,.18); color: var(--green); }
.tag.ativo { background: rgba(83,189,235,.18); color: var(--blue); }
.tag.pausado { background: rgba(245,166,35,.18); color: var(--orange); }
.tag.concluido { background: rgba(149,165,166,.2); color: #aab8bd; }
.tag.pay { background: rgba(245,196,81,.2); color: var(--gold); }
.tag.tier { background: rgba(255,255,255,.07); color: #c9d3d8; }
.badge-count { background: var(--green); color: #06241d; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }

.stats-bar { padding: 8px 14px; background: #182229; font-size: 11px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; border-top: 1px solid var(--border); }
.stats-bar b { color: var(--green); }

/* CHAT */
.main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
.chat-header { padding: 10px 16px; background: var(--panel2); display: flex; align-items: center; gap: 12px; min-height: 60px; border-bottom: 1px solid var(--border); }
.chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#00a884,#0a6e5c); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; }
.chat-header-info { flex: 1; min-width: 0; }
.chat-header-info h3 { font-size: 16px; font-weight: 500; }
.chat-header-info span { font-size: 12px; color: var(--muted); }
.window-badge { padding: 5px 12px; border-radius: 16px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.window-badge.open { background: rgba(0,168,132,.16); color: var(--green); }
.window-badge.urgent { background: rgba(245,166,35,.16); color: var(--orange); }
.window-badge.closed { background: rgba(241,92,109,.16); color: var(--red); }
.window-badge.none { background: rgba(149,165,166,.16); color: var(--muted); }

.messages-container { flex: 1; overflow-y: auto; padding: 18px 8%; background-image: linear-gradient(rgba(11,20,26,.96),rgba(11,20,26,.96)); }
.msg-date-divider { text-align: center; margin: 14px 0; }
.msg-date-divider span { background: #182229; color: var(--muted); font-size: 12px; padding: 5px 12px; border-radius: 8px; }
.message { max-width: 62%; margin-bottom: 4px; display: flex; flex-direction: column; }
.message.sent { margin-left: auto; align-items: flex-end; }
.message.received { margin-right: auto; align-items: flex-start; }
.msg-bubble { padding: 7px 9px 5px; border-radius: 8px; font-size: 14.2px; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap; min-width: 90px; max-width: 100%; }
.message.sent .msg-bubble { background: var(--green2); border-top-right-radius: 2px; }
.message.received .msg-bubble { background: var(--panel2); border-top-left-radius: 2px; }
.msg-text { display: block; }
.msg-time { font-size: 10.5px; color: rgba(233,237,239,.55); text-align: right; margin-top: 2px; }
.msg-media img { max-width: 300px; border-radius: 6px; margin-bottom: 3px; cursor: pointer; }
.msg-media audio { max-width: 280px; margin: 2px 0; }
.msg-media video { max-width: 300px; border-radius: 6px; }
.msg-media-label { display: flex; align-items: center; gap: 8px; padding: 9px 11px; background: rgba(0,0,0,.18); border-radius: 6px; margin-bottom: 3px; font-size: 13px; }

.input-area { padding: 10px 16px; background: var(--panel2); display: flex; align-items: flex-end; gap: 10px; border-top: 1px solid var(--border); }
.input-area textarea { flex: 1; padding: 11px 14px; border-radius: 10px; border: none; background: var(--panel3); color: var(--text); font-size: 14px; outline: none; font-family: inherit; resize: none; max-height: 120px; min-height: 44px; line-height: 1.4; }
.input-area textarea::placeholder { color: var(--muted); }
.input-area textarea:disabled { opacity: .5; }
.send-btn, .tmpl-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s; }
.send-btn { background: var(--green); color: #fff; font-size: 20px; }
.send-btn:hover { background: #00c39a; }
.send-btn:disabled { background: var(--panel3); cursor: default; }
.tmpl-btn { background: var(--panel3); color: var(--muted); font-size: 20px; }
.tmpl-btn:hover { color: var(--text); }

.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; color: var(--muted); }
.empty-state .big { font-size: 56px; margin-bottom: 14px; opacity: .25; }

/* DETAIL PANEL */
.detail-panel { width: 320px; background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; display: none; }
.detail-panel.show { display: block; }
.detail-hero { padding: 28px 20px; text-align: center; background: var(--panel2); }
.detail-hero .av { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg,#00a884,#0a6e5c); display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 600; margin: 0 auto 12px; }
.detail-hero h3 { font-size: 19px; }
.detail-hero .phone { font-size: 13px; color: var(--muted); margin-top: 3px; cursor: pointer; }
.detail-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.detail-section h4 { font-size: 12px; text-transform: uppercase; color: var(--green); margin-bottom: 12px; letter-spacing: .5px; }
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13.5px; }
.detail-row .lbl { color: var(--muted); }
.detail-row .val { font-weight: 500; text-align: right; }
.progress-wrap { margin-top: 6px; }
.progress-bar { height: 8px; background: var(--panel3); border-radius: 4px; overflow: hidden; position: relative; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#00a884,#53bdeb); border-radius: 4px; transition: width .4s; }
.progress-milestones { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: var(--muted); }

/* METRICS */
.metrics { flex: 1; overflow-y: auto; padding: 24px; display: none; }
.metrics.show { display: block; }
.metrics h2 { font-size: 20px; margin-bottom: 4px; }
.metrics .sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
.cards { display: grid; grid-template-columns: repeat(auto-fill,minmax(160px,1fr)); gap: 14px; margin-bottom: 26px; }
.card { background: var(--panel2); border-radius: 12px; padding: 18px; border: 1px solid var(--border); }
.card .num { font-size: 30px; font-weight: 700; }
.card .lbl { font-size: 13px; color: var(--muted); margin-top: 4px; }
.card.green .num { color: var(--green); } .card.blue .num { color: var(--blue); }
.card.orange .num { color: var(--orange); } .card.red .num { color: var(--red); }
.card.gold .num { color: var(--gold); }
.metric-block { background: var(--panel2); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
.metric-block h3 { font-size: 15px; margin-bottom: 16px; }
.bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
.bar-row .bl { width: 130px; font-size: 13px; color: var(--muted); flex-shrink: 0; }
.bar-track { flex: 1; height: 22px; background: var(--panel3); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; color: #06241d; min-width: 28px; transition: width .5s; }

/* MODAIS / POPUPS */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.show { display: flex; }
.modal { background: var(--panel2); padding: 30px; border-radius: 14px; width: 440px; max-width: 92vw; max-height: 90vh; overflow-y: auto; }
.modal h3 { margin-bottom: 18px; }
.modal label { font-size: 13px; color: var(--muted); display: block; margin-top: 12px; }
.modal input { width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--panel3); color: var(--text); font-size: 14px; margin-top: 5px; outline: none; }
.modal .btn { width: 100%; padding: 11px; border-radius: 8px; border: none; background: var(--green); color: #06241d; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 18px; }
.tmpl-popup { display: none; position: absolute; bottom: 70px; left: 16px; right: 16px; background: var(--panel2); border: 1px solid var(--border); border-radius: 12px; padding: 8px; z-index: 50; box-shadow: 0 8px 30px rgba(0,0,0,.5); max-height: 280px; overflow-y: auto; }
.tmpl-popup.show { display: block; }
.tmpl-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13.5px; color: var(--text); }
.tmpl-item:hover { background: var(--panel3); }
.tmpl-add { padding: 9px 12px; color: var(--green); cursor: pointer; font-size: 13px; border-top: 1px solid var(--border); margin-top: 4px; }
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 300; align-items: center; justify-content: center; cursor: zoom-out; }
.lightbox.show { display: flex; }
.lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: #06241d; padding: 11px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; z-index: 400; display: none; box-shadow: 0 6px 24px rgba(0,0,0,.4); }
.toast.error { background: var(--red); color: #fff; }
.toast.show { display: block; animation: slideUp .3s; }
@keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(12px); } }

.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--muted); }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 7px; } ::-webkit-scrollbar-thumb { background: var(--panel3); border-radius: 4px; }

@media (max-width: 900px) {
  .detail-panel { position: fixed; right: 0; top: 0; bottom: 0; z-index: 100; }
  .sidebar { width: 100%; }
  .main { display: none; position: fixed; inset: 0; z-index: 60; }
  .main.mobile-show { display: flex; }
  .messages-container { padding: 12px 14px; }
  .message { max-width: 85%; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <h2>Cigana Maria</h2>
    <button class="icon-btn" id="soundToggle" onclick="toggleSound()" title="Som de notificação">🔔</button>
    <button class="icon-btn" onclick="manualRefresh()" title="Atualizar">⟳</button>
    <button class="icon-btn" onclick="showModal('configModal')" title="Configurar">⚙</button>
  </div>
  <div class="tabs">
    <div class="tab active" data-view="conversas" onclick="switchView('conversas')">💬 Conversas</div>
    <div class="tab" data-view="painel" onclick="switchView('painel')">📊 Painel</div>
  </div>
  <div class="search-box"><input type="text" id="searchInput" placeholder="Pesquisar nome ou telefone..."></div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="todos">Todos</button>
    <button class="filter-btn" data-filter="ativo">Ativos</button>
    <button class="filter-btn" data-filter="pausado">Pausados</button>
    <button class="filter-btn" data-filter="concluido">Concluídos</button>
    <button class="filter-btn" data-filter="janela_aberta">🟢 Janela 24h</button>
    <button class="filter-btn" data-filter="janela_fechada">🔴 Fora 24h</button>
    <button class="filter-btn" data-filter="pagamento">💰 Pagamento</button>
  </div>
  <div class="sort-row">
    <span style="font-size:12px;color:var(--muted)">Ordenar:</span>
    <select id="sortSelect" onchange="render()">
      <option value="recente">Mensagem recente</option>
      <option value="etapa_desc">Etapa (maior)</option>
      <option value="etapa_asc">Etapa (menor)</option>
      <option value="janela">Urgência janela 24h</option>
      <option value="nome">Nome (A-Z)</option>
    </select>
  </div>
  <div class="contacts-list" id="contactsList"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<!-- MAIN -->
<div class="main" id="mainArea">
  <div class="empty-state" id="emptyState">
    <div class="big">💬</div>
    <p>Selecione um lead para ver a conversa</p>
  </div>
  <div class="chat-header" id="chatHeader" style="display:none;"></div>
  <div class="messages-container" id="messagesContainer" style="display:none;"></div>
  <div class="tmpl-popup" id="tmplPopup"></div>
  <div class="input-area" id="inputArea" style="display:none;">
    <button class="tmpl-btn" onclick="toggleTemplates()" title="Mensagens rápidas">⚡</button>
    <textarea id="msgInput" placeholder="Mensagem avulsa..." rows="1"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- METRICS -->
<div class="metrics" id="metricsView"></div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel"></div>

<!-- CONFIG MODAL -->
<div class="modal-bg" id="configModal">
  <div class="modal">
    <h3>Configurar Acesso</h3>
    <label>Supabase Anon Key (eyJ...)</label>
    <input id="cfgSupaKey" type="password" placeholder="eyJhbG...">
    <label>WhatsApp Token</label>
    <input id="cfgWppToken" type="password" placeholder="EAAS...">
    <label>WhatsApp Phone ID</label>
    <input id="cfgWppPhoneId" placeholder="1154545071084799">
    <button class="btn" onclick="saveConfig()">Salvar e Entrar</button>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')"><img id="lightboxImg" src=""></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://lfnaheksewpqgqoxpszn.supabase.co';
let SUPABASE_KEY = '', WPP_PHONE_ID = '', WPP_TOKEN = '', headers = {};
const PAGOU_PRECOS = [ {min:82,label:'4ª oferta',valor:'R$97'}, {min:62,label:'3ª oferta',valor:'R$67'}, {min:42,label:'2ª oferta',valor:'R$70'}, {min:1,label:'1ª oferta',valor:'R$40'} ];
const TOTAL_ETAPAS = 88;
const WINDOW_MS = 24*60*60*1000;

let leads = [], currentLead = null, currentFilter = 'todos', currentView = 'conversas';
let sending = false, soundOn = true, lastSeenReceived = {}, firstLoad = true;

/* ---------- CONFIG ---------- */
function loadConfig() {
  SUPABASE_KEY = localStorage.getItem('cgm_supa_key') || '';
  WPP_TOKEN = localStorage.getItem('cgm_wpp_token') || '';
  WPP_PHONE_ID = localStorage.getItem('cgm_wpp_phone_id') || '1154545071084799';
  soundOn = localStorage.getItem('cgm_sound') !== '0';
  document.getElementById('soundToggle').textContent = soundOn ? '🔔' : '🔕';
  headers = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY, 'Content-Type': 'application/json' };
}
function saveConfig() {
  const k = document.getElementById('cfgSupaKey').value.trim();
  const t = document.getElementById('cfgWppToken').value.trim();
  const p = document.getElementById('cfgWppPhoneId').value.trim();
  if (!k) { alert('Supabase Key obrigatória'); return; }
  localStorage.setItem('cgm_supa_key', k);
  if (t) localStorage.setItem('cgm_wpp_token', t);
  if (p) localStorage.setItem('cgm_wpp_phone_id', p);
  loadConfig(); hideModal('configModal'); init();
}
function checkConfig() { loadConfig(); if (!SUPABASE_KEY) { showModal('configModal'); return false; } return true; }
function showModal(id){ document.getElementById(id).classList.add('show'); }
function hideModal(id){ document.getElementById(id).classList.remove('show'); }
function toggleSound(){ soundOn=!soundOn; localStorage.setItem('cgm_sound', soundOn?'1':'0'); document.getElementById('soundToggle').textContent = soundOn?'🔔':'🔕'; }

/* ---------- DATA ---------- */
async function fetchLeads() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/leads_dashboard?select=*`, { headers });
  if (!r.ok) { showToast('Erro ao buscar leads ('+r.status+')', true); return []; }
  return r.json();
}
async function fetchMessages(id) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/mensagens?messenger_id=eq.${encodeURIComponent(id)}&select=*&order=criado_em.asc`, { headers });
  return r.ok ? r.json() : [];
}

/* ---------- HELPERS ---------- */
function initials(n){ if(!n) return '?'; const p=n.trim().split(' '); return (p.length>=2?(p[0][0]+p[1][0]):p[0][0]).toUpperCase(); }
function esc(t){ const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }
function tierOf(e){ for(const t of PAGOU_PRECOS){ if(e>=t.min) return t; } return PAGOU_PRECOS[3]; }

function windowInfo(lead){
  if(!lead.ultima_msg_recebida) return {cls:'none', label:'Sem msg recebida', remaining:null};
  const rem = WINDOW_MS - (Date.now() - new Date(lead.ultima_msg_recebida).getTime());
  if(rem <= 0) return {cls:'closed', label:'Janela fechada', remaining:rem};
  const h = Math.floor(rem/3600000), m = Math.floor((rem%3600000)/60000);
  const lbl = h>0 ? `${h}h ${m}m` : `${m}m`;
  return { cls: rem < 3600000 ? 'urgent' : 'open', label: lbl, remaining: rem };
}
function fmtTime(s){ if(!s) return ''; const d=new Date(s), n=new Date(), diff=n-d, day=86400000;
  if(diff<day && d.getDate()===n.getDate()) return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(diff<day*2) return 'Ontem';
  if(diff<day*7) return d.toLocaleDateString('pt-BR',{weekday:'short'});
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); }
function fmtFull(s){ return s ? new Date(s).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : ''; }
function fmtDate(s){ if(!s) return ''; const d=new Date(s), n=new Date(), diff=n-d;
  if(diff<86400000 && d.getDate()===n.getDate()) return 'Hoje';
  if(diff<172800000) return 'Ontem';
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDateTime(s){ return s ? new Date(s).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—'; }
function tempoDesde(s){ if(!s) return '—'; const diff=Date.now()-new Date(s).getTime();
  const h=Math.floor(diff/3600000), d=Math.floor(h/24);
  if(d>0) return `há ${d}d ${h%24}h`; if(h>0) return `há ${h}h`; return `há ${Math.floor(diff/60000)}min`; }
function previewMsg(l){ if(!l.ultima_msg_conteudo){ const m={imagem:'📷 Imagem',image:'📷 Imagem',audio:'🎵 Áudio',video:'🎬 Vídeo',documento:'📄 Documento',document:'📄 Documento',sticker:'🌟 Figurinha'}; return m[l.ultima_msg_tipo]||''; } return l.ultima_msg_conteudo; }

/* ---------- RENDER LIST ---------- */
function applyFilter(list){
  let f = list;
  if(['ativo','pausado','concluido'].includes(currentFilter)) f = f.filter(l=>l.status===currentFilter);
  else if(currentFilter==='janela_aberta') f = f.filter(l=>['open','urgent'].includes(windowInfo(l).cls));
  else if(currentFilter==='janela_fechada') f = f.filter(l=>windowInfo(l).cls==='closed');
  else if(currentFilter==='pagamento') f = f.filter(l=>l.reivindicou_pagamento);
  const s = document.getElementById('searchInput').value.toLowerCase();
  if(s) f = f.filter(l=>(l.nome||'').toLowerCase().includes(s) || l.messenger_id.includes(s));
  return f;
}
function applySort(list){
  const s = document.getElementById('sortSelect').value;
  const a = [...list];
  if(s==='recente') a.sort((x,y)=> new Date(y.ultima_msg||y.ultima_interacao||0) - new Date(x.ultima_msg||x.ultima_interacao||0));
  else if(s==='etapa_desc') a.sort((x,y)=>y.etapa_atual-x.etapa_atual);
  else if(s==='etapa_asc') a.sort((x,y)=>x.etapa_atual-y.etapa_atual);
  else if(s==='nome') a.sort((x,y)=>(x.nome||'zzz').localeCompare(y.nome||'zzz'));
  else if(s==='janela') a.sort((x,y)=>{ const rx=windowInfo(x).remaining, ry=windowInfo(y).remaining;
    if(rx===null) return 1; if(ry===null) return -1; if(rx<=0&&ry>0) return 1; if(ry<=0&&rx>0) return -1; return rx-ry; });
  return a;
}
function renderContacts(){
  const list = applySort(applyFilter(leads));
  const el = document.getElementById('contactsList');
  if(!list.length){ el.innerHTML='<div class="loading" style="color:var(--muted)">Nenhum lead encontrado</div>'; return; }
  el.innerHTML = list.map(l=>{
    const w = windowInfo(l), t = tierOf(l.etapa_atual);
    return `<div class="contact-item ${currentLead?.messenger_id===l.messenger_id?'active':''}" onclick="selectLead('${l.messenger_id}')">
      <div class="contact-avatar">${initials(l.nome)}<div class="window-dot ${w.cls}" title="${w.label}"></div></div>
      <div class="contact-info">
        <div class="contact-top">
          <span class="contact-name">${esc(l.nome)||l.messenger_id}</span>
          <span class="contact-time">${fmtTime(l.ultima_msg||l.ultima_interacao)}</span>
        </div>
        <div class="contact-bottom">
          <span class="contact-preview">${l.ultima_msg_direcao==='enviada'?'↳ ':''}${esc(previewMsg(l)).slice(0,60)}</span>
        </div>
        <div class="contact-tags">
          <span class="tag etapa">Etapa ${l.etapa_atual}</span>
          <span class="tag ${l.status}">${l.status}</span>
          <span class="tag tier">${t.valor}</span>
          ${l.reivindicou_pagamento?'<span class="tag pay">💰 pagou?</span>':''}
        </div>
      </div>
    </div>`;
  }).join('');
}
function renderStats(){
  const t=leads.length, a=leads.filter(l=>l.status==='ativo').length, p=leads.filter(l=>l.status==='pausado').length, c=leads.filter(l=>l.status==='concluido').length;

}

/* ---------- CHAT ---------- */
function mediaHtml(m){
  const url = m.media_url || '';
  const isUrl = url.startsWith('http');
  if(m.tipo==='imagem'||m.tipo==='image'){ return isUrl?`<div class="msg-media"><img src="${url}" onclick="openLightbox('${url}')" loading="lazy"></div>`:`<div class="msg-media-label">📷 Imagem recebida</div>`; }
  if(m.tipo==='audio'){ return isUrl?`<div class="msg-media"><audio controls src="${url}"></audio></div>`:`<div class="msg-media-label">🎵 Áudio recebido</div>`; }
  if(m.tipo==='video'){ return isUrl?`<div class="msg-media"><video controls src="${url}"></video></div>`:`<div class="msg-media-label">🎬 Vídeo recebido</div>`; }
  if(m.tipo==='documento'||m.tipo==='document'){ return isUrl?`<div class="msg-media-label">📄 <a href="${url}" target="_blank" style="color:var(--blue)">Documento</a></div>`:`<div class="msg-media-label">📄 Documento recebido</div>`; }
  if(m.tipo==='sticker') return `<div class="msg-media-label">🌟 Figurinha</div>`;
  return '';
}
function renderMessages(msgs){
  let html='', lastDate='';
  for(const m of msgs){
    const d=fmtDate(m.criado_em);
    if(d!==lastDate){ html+=`<div class="msg-date-divider"><span>${d}</span></div>`; lastDate=d; }
    const dir = m.direcao==='enviada'?'sent':'received';
    const media = m.media_url||['imagem','image','audio','video','documento','document','sticker'].includes(m.tipo) ? mediaHtml(m):'';
    const txt = m.conteudo?`<span class="msg-text">${esc(m.conteudo)}</span>`:'';
    html+=`<div class="message ${dir}"><div class="msg-bubble">${media}${txt}<div class="msg-time">${fmtFull(m.criado_em)}</div></div></div>`;
  }
  return html;
}
async function selectLead(id){
  currentLead = leads.find(l=>l.messenger_id===id); if(!currentLead) return;
  renderContacts();
  document.getElementById('emptyState').style.display='none';
  document.getElementById('chatHeader').style.display='flex';
  document.getElementById('messagesContainer').style.display='block';
  document.getElementById('inputArea').style.display='flex';
  document.getElementById('mainArea').classList.add('mobile-show');
  renderChatHeader();
  renderDetailPanel();
  const c=document.getElementById('messagesContainer');
  c.innerHTML='<div class="loading"><div class="spinner"></div>Carregando mensagens...</div>';
  const msgs=await fetchMessages(id);
  c.innerHTML = msgs.length?renderMessages(msgs):'<div class="loading" style="color:var(--muted)">Nenhuma mensagem registrada ainda</div>';
  c.scrollTop=c.scrollHeight;
}

/* ---------- SEND ---------- */
async function sendMessage(){
  if(sending||!currentLead) return;
  const inp=document.getElementById('msgInput'); const txt=inp.value.trim(); if(!txt) return;
  if(!WPP_TOKEN){ showToast('Configure o WhatsApp Token (⚙)', true); return; }
  sending=true; document.getElementById('sendBtn').disabled=true;
  try{
    const r=await fetch(`https://graph.facebook.com/v21.0/${WPP_PHONE_ID}/messages`,{
      method:'POST', headers:{'Authorization':'Bearer '+WPP_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({messaging_product:'whatsapp',to:currentLead.messenger_id,type:'text',text:{body:txt}})
    });
    const data=await r.json();
    if(data.error){ showToast('Erro: '+(data.error.message||'falha'), true); return; }
    await fetch(`${SUPABASE_URL}/rest/v1/mensagens`,{ method:'POST', headers:{...headers,'Prefer':'return=minimal'},
      body:JSON.stringify({messenger_id:currentLead.messenger_id,direcao:'enviada',tipo:'texto',conteudo:txt}) });
    inp.value=''; inp.style.height='auto'; showToast('Mensagem enviada!');
    const msgs=await fetchMessages(currentLead.messenger_id);
    const c=document.getElementById('messagesContainer'); c.innerHTML=renderMessages(msgs); c.scrollTop=c.scrollHeight;
  }catch(e){ showToast('Erro: '+e.message, true); }
  finally{ sending=false; document.getElementById('sendBtn').disabled=false; }
}

/* ---------- TEMPLATES ---------- */
function getTemplates(){ try{ return JSON.parse(localStorage.getItem('cgm_templates'))||defaultTemplates(); }catch{ return defaultTemplates(); } }
function defaultTemplates(){ return ['Oi! Tudo bem? 😊','Conseguiu ver minha última mensagem?','Estou aqui pra te ajudar 💜','Me chama quando puder, tá bom?','Você ainda tem interesse?']; }
function toggleTemplates(){
  const p=document.getElementById('tmplPopup');
  if(p.classList.contains('show')){ p.classList.remove('show'); return; }
  const tmpls=getTemplates();
  p.innerHTML = tmpls.map((t,i)=>`<div class="tmpl-item" onclick="useTemplate(${i})">${esc(t)}</div>`).join('') + `<div class="tmpl-add" onclick="addTemplate()">+ Adicionar mensagem rápida</div>`;
  p.classList.add('show');
}
function useTemplate(i){ const t=getTemplates()[i]; const inp=document.getElementById('msgInput'); inp.value=t; inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,120)+'px'; document.getElementById('tmplPopup').classList.remove('show'); inp.focus(); }
function addTemplate(){ const t=prompt('Nova mensagem rápida:'); if(t){ const arr=getTemplates(); arr.push(t); localStorage.setItem('cgm_templates',JSON.stringify(arr)); toggleTemplates(); toggleTemplates(); } }

/* ---------- METRICS ---------- */

      <div class="card red"><div class="num">${jf}</div><div class="lbl">🔴 Fora da janela 24h</div></div>
      <div class="card gold"><div class="num">${pg}</div><div class="lbl">💰 Reivindicaram pagamento</div></div>
      <div class="card red"><div class="num">${parados}</div><div class="lbl">⚠️ Pausados + fora de 24h</div></div>
    </div>

      <h3>Distribuição por faixa de oferta</h3>

/* ---------- VIEW SWITCH ---------- */
function switchView(v){
  currentView=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  if(v==='painel'){
    document.getElementById('mainArea').style.display='none';
    document.getElementById('detailPanel').classList.remove('show');
    document.getElementById('metricsView').classList.add('show');
    renderMetrics();
  } else {
    document.getElementById('metricsView').classList.remove('show');
    document.getElementById('mainArea').style.display='flex';
  }
}

/* ---------- NOTIFICATIONS ---------- */
function checkNewMessages(newLeads){
  if(firstLoad){ newLeads.forEach(l=>{ if(l.ultima_msg_recebida) lastSeenReceived[l.messenger_id]=l.ultima_msg_recebida; }); firstLoad=false; return; }
  let hasNew=false;
  for(const l of newLeads){
    if(l.ultima_msg_recebida && l.ultima_msg_recebida!==lastSeenReceived[l.messenger_id]){
      if(lastSeenReceived[l.messenger_id]!==undefined || !firstLoad) hasNew=true;
      lastSeenReceived[l.messenger_id]=l.ultima_msg_recebida;
    }
  }
  if(hasNew && soundOn) playBeep();
}
function playBeep(){ try{ const ctx=new(window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(), g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination); o.frequency.value=880; o.type='sine'; g.gain.setValueAtTime(.18,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3); o.start(); o.stop(ctx.currentTime+.3); }catch(e){} }

/* ---------- CORE ---------- */
function render(){ renderContacts(); renderStats(); if(currentView==='painel') renderMetrics(); }
function showToast(m,err){ const t=document.getElementById('toast'); t.textContent=m; t.className='toast show'+(err?' error':''); setTimeout(()=>t.className='toast',2800); }

async function refresh(){
  const data=await fetchLeads();
  checkNewMessages(data);
  leads=data; render();
  if(currentLead){
    const updated=leads.find(l=>l.messenger_id===currentLead.messenger_id);
    if(updated){ currentLead=updated; renderChatHeader(); if(document.getElementById('detailPanel').classList.contains('show')) renderDetailPanel();
      const c=document.getElementById('messagesContainer');
      const atBottom = c.scrollHeight-c.scrollTop-c.clientHeight<60;
      const msgs=await fetchMessages(currentLead.messenger_id);
      c.innerHTML=renderMessages(msgs); if(atBottom) c.scrollTop=c.scrollHeight;
    }
  }
}
function manualRefresh(){ showToast('Atualizando...'); refresh(); }

async function init(){ if(!checkConfig()) return; await refresh(); }

document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); currentFilter=b.dataset.filter; renderContacts();
}));
document.getElementById('searchInput').addEventListener('input',renderContacts);
document.getElementById('msgInput')?.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
document.addEventListener('click',e=>{ const p=document.getElementById('tmplPopup'); if(p.classList.contains('show') && !p.contains(e.target) && !e.target.classList.contains('tmpl-btn')) p.classList.remove('show'); });

init();
setInterval(refresh, 10000);
setInterval(()=>{ if(currentLead) renderChatHeader(); renderContacts(); }, 60000); // atualiza contadores 24h
</script>
